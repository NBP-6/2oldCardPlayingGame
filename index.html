<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hourglass — The 1vs1 Card Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0c0f;--bg2:#0e1218;--bg3:#141920;
  --gold:#c8963c;--gold2:#e8d5aa;--gold3:#7a6a50;
  --text:#c8b99a;--text2:#9a8870;--text3:#5a4a30;
  --border:rgba(180,150,90,0.2);
  --naval:#1a3a5c;--naval-b:#4a9ad4;
  --pirate:#5c1a1a;--pirate-b:#d44a4a;
  --repair:#1a3a1a;--repair-b:#4ad44a;
  --heal:#1a3a2a;--heal-b:#4ad4a0;
  --chaos:#3a2a0a;--chaos-b:#d4a44a;
  --consumed-b:#9a7adc;
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',serif;min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* BACKGROUND IMAGE — applied via JS if bg.jpg exists */
.has-bg{background-image:url('bg.jpg');background-size:cover;background-position:center;background-attachment:fixed;}
.has-bg::before{content:'';position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:0;pointer-events:none;}
.has-bg > *{position:relative;z-index:1;}

/* MUSIC CONTROL */
#music-ctrl{position:fixed;bottom:14px;right:14px;z-index:9999;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:20px;padding:6px 12px;}
#music-btn{background:none;border:none;color:var(--gold);font-size:16px;cursor:pointer;padding:0;line-height:1;}
#music-vol{-webkit-appearance:none;appearance:none;width:70px;height:3px;background:rgba(180,150,90,0.3);border-radius:2px;outline:none;cursor:pointer;}
#music-vol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--gold);cursor:pointer;}

/* INTRO */
#screen-intro{align-items:center;justify-content:center;text-align:center;background:radial-gradient(ellipse 100% 60% at 50% 100%,#0d2436 0%,transparent 70%),var(--bg);}
.intro-skull{font-size:52px;margin-bottom:16px;opacity:0.6;}
.intro-eyebrow{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold3);margin-bottom:16px;}
.intro-title{font-family:'Cinzel',serif;font-size:clamp(48px,10vw,80px);font-weight:700;color:var(--gold2);letter-spacing:3px;line-height:1;}
.intro-sub{font-family:'Cinzel',serif;font-size:12px;letter-spacing:5px;color:var(--gold3);text-transform:uppercase;margin-top:8px;}
.intro-divider{display:flex;align-items:center;gap:12px;margin:24px auto;max-width:300px;}
.intro-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(180,150,90,0.4),transparent);}
.intro-tagline{font-family:'Crimson Text',serif;font-style:italic;font-size:20px;color:var(--text2);margin-bottom:32px;}
.btn{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#0a0c0f;background:linear-gradient(160deg,#c8963c,#a07030);border:none;border-radius:2px;padding:14px 36px;cursor:pointer;transition:opacity 0.2s,transform 0.2s;}
.btn:hover{opacity:0.85;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--gold);border:1px solid rgba(180,150,90,0.4);border-radius:2px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:10px 24px;cursor:pointer;transition:all 0.2s;margin-top:12px;}
.btn-ghost:hover{background:rgba(180,150,90,0.1);}

/* MODIFIER INTRO */
#screen-modifier{align-items:center;justify-content:center;text-align:center;background:radial-gradient(ellipse 100% 60% at 50% 100%,#0d1824 0%,transparent 70%),var(--bg);padding:40px;}
.mod-icon{font-size:60px;margin-bottom:20px;opacity:0.7;}
.mod-battle-num{font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--gold3);margin-bottom:12px;}
.mod-battle-name{font-family:'Cinzel',serif;font-size:36px;color:var(--gold2);margin-bottom:16px;}
.mod-battle-desc{font-family:'Crimson Text',serif;font-style:italic;font-size:18px;color:var(--text);max-width:500px;margin:0 auto 32px;}

/* GAME LAYOUT */
#screen-game{flex-direction:column;background:radial-gradient(ellipse 120% 60% at 50% 100%,#0d2436 0%,transparent 70%),var(--bg);height:100vh;overflow:hidden;}
.game-layout{display:grid;grid-template-columns:190px 1fr 180px;grid-template-rows:auto auto 1fr auto auto;height:100vh;overflow:hidden;}

/* TOP BAR */
.top-bar{grid-column:1/4;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.35);}
.streak-display{display:flex;align-items:center;gap:5px;}
.streak-pip{width:22px;height:22px;border-radius:50%;border:1px solid rgba(180,150,90,0.2);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:8px;color:var(--gold3);transition:all 0.3s;}
.streak-pip.done{background:rgba(60,130,80,0.3);border-color:rgba(80,160,100,0.5);color:#80c890;}
.streak-pip.current{background:rgba(180,130,40,0.3);border-color:rgba(200,160,70,0.6);color:var(--gold2);box-shadow:0 0 6px rgba(180,130,40,0.3);}
.streak-pip.boss{width:26px;height:26px;background:rgba(120,50,160,0.2);border-color:rgba(150,80,190,0.5);color:#c090e0;}
.top-title{font-family:'Cinzel',serif;font-size:15px;color:var(--gold2);letter-spacing:2px;}

/* MODIFIER BAR */
.modifier-bar{grid-column:1/4;padding:5px 14px;background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2);}
.modifier-badge{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;background:rgba(180,130,40,0.2);color:var(--gold);border:1px solid rgba(180,130,40,0.3);padding:2px 7px;border-radius:2px;white-space:nowrap;}

/* LOG */
.log-panel{grid-row:3/6;grid-column:1/2;border-right:1px solid var(--border);padding:10px;overflow-y:auto;overflow-x:hidden;background:rgba(0,0,0,0.12);height:0;min-height:100%;}
.log-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold3);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.log-entry{font-size:11.5px;line-height:1.5;color:var(--text3);padding:2px 0;border-bottom:1px solid rgba(180,150,90,0.05);}
.log-entry.player{color:var(--text2);}
.log-entry.ai{color:#8a7090;}
.log-entry.event{color:#7a9070;font-style:italic;}
.log-entry.damage{color:#b05050;}
.log-entry.heal{color:#50a060;}

/* BATTLEFIELD */
.battlefield{grid-row:3/5;grid-column:2/3;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:14px;gap:10px;overflow:hidden;}

/* COMBATANT */
.combatant{width:100%;max-width:440px;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:4px;padding:12px 14px;}
.combatant.enemy{border-color:rgba(160,80,80,0.3);}
.combatant.player{border-color:rgba(80,130,160,0.3);}
.combatant-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.combatant-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold2);}
.combatant-status{display:flex;gap:5px;flex-wrap:wrap;}
.status-pill{font-size:10px;padding:2px 6px;border-radius:10px;font-family:'Cinzel',serif;letter-spacing:0.5px;}
.s-burning{background:rgba(180,80,20,0.3);color:#e08050;border:1px solid rgba(180,80,20,0.4);}
.s-drunk{background:rgba(100,60,140,0.3);color:#b080d0;border:1px solid rgba(100,60,140,0.4);}
.s-chain{background:rgba(80,80,140,0.3);color:#8080d0;border:1px solid rgba(80,80,140,0.4);}
.s-tuck{background:rgba(40,100,140,0.3);color:#60b0d0;border:1px solid rgba(40,100,140,0.4);}
